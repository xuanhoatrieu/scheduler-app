services:
  # --- Dịch vụ Backend API ---
  scheduler-api:
    image: ghcr.io/xuanhoatrieu/scheduler-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scheduler-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Đọc toàn bộ chuỗi kết nối DB_URI từ file .env
      DB_URI: ${DB_URI}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATA_SOURCE: crawler
    networks:
      - tuaf-ai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Sử dụng mạng lưới chung có sẵn của máy chủ TUAF Server (kết nối proxy Caddy và Supabase)
networks:
  tuaf-ai-network:
    external: true
    name: tuaf-ai-network
